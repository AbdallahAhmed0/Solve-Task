<header class="header">
  <div class="header-content">
    <div class="gas-icon">
      <img src="../../../assets/gas-station-svgrepo-com.svg" width="30" height="30"  title="dashboard" alt="dashboard">
      <span class="number">2/3</span>
      <span class="text">
        <span class="word">Monitored</span>
        <span class="word">Stations</span>
      </span>
    </div>
    <div class="loading">
      <img src="../../../assets/loading.PNG" width="32" height="32" title="loading" alt="loading">
      <span class="number">20S</span>
      <span class="text">
        <span class="word">Last</span>
        <span class="word">Update</span>
      </span>
    </div>
    <div class="btn-group" role="group">
      <button type="button" class="btn" >TODAY</button>
      <button type="button" class="btn" >YESTERDAY</button>
      <button type="button" class="btn" >LAST WEEK</button>
    </div>
    <div class="date">
      <input type="datetime-local" data-placeholder="Start date-time" class="inp-date" >
      <input type="datetime-local"data-placeholder="Start date-time" class="inp-date">
    </div>
  </div>
</header>
